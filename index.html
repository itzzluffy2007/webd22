<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tailwind hero landing page</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <header>
            <nav class="mt-5 mb-5 flex justify-around items-center sticky top-0 z-50">
                <h1 class="font-bold">💫 Project</h1>
                <ul class="flex gap-8 items-center">
                    <li><a class="hover:bg-black hover:text-white p-2 rounded shadow-black shadow-lg/30 ease-in-out duration-300" href="#">Product</a></li>
                    <li><a class="hover:bg-black hover:text-white p-2 rounded shadow-black shadow-lg/30 ease-in-out duration-300" href="#">Solutions</a></li>
                    <li><a class="hover:bg-black hover:text-white p-2 rounded shadow-black shadow-lg/30 ease-in-out duration-300" href="#">Resources</a></li>
                    <li><a class="hover:bg-black hover:text-white p-2 rounded shadow-black shadow-lg/30 ease-in-out duration-300" href="#">Pricing</a></li>
                    <li><a class="hover:bg-black hover:text-white p-2 rounded shadow-black shadow-lg/30 ease-in-out duration-300" href="#">Log in</a></li>
                </ul>
                <button class="bg-black text-white p-2 rounded shadow-black shadow-lg/30">Get AI Free</button>
            </nav>
        </header>

        <section class="realtive h-100 bg-linear-to-b from-orange-200 to-white-200">
            <h1 class="text-center text-3xl font-extrabold p-2">Write, plan, share. <br>
                With AI at your side.
            </h1>
            <p class="text-center text-sm mb-3">It is the connected workspace where better, faster work happens. Now with AI</p>
            <div class="ralative">
                <button class="absolute top-50 left-60 bg-black text-white p-2 mr-5 lg:left-150 rounded shadow-black shadow-md ease-in-out duration-300 hover:scale-110">Get AI Free🔜</button>
                <button class="absolute top-50 right-60 bg-blue-500 text-white p-2 ml-5 lg:right-150 rounded shadow-blue-500 shadow-md ease-in-out duration-300 hover:scale-110">Request a demo</button>
            </div>
            <img class="absolute bottom-2 left-40 lg:left-130" src="https://i.pinimg.com/736x/78/43/46/7843469a63cd08ac20eb92d6c7cec259.jpg" alt="workplace">
            <div class="absolute bottom-75 left-6 lg:left-70 lg:text-base lg:w-40 bg-white-950 p-2 w-33 shadow-black shadow-lg/30 rounded">
                <h1 class="text-sm">⚒️Tasks</h1>
                <p class="text-xs">Task completed <br> successfully</p>
            </div>
            <div class="absolute bottom-50 right-3 lg:right-50 lg:text-base lg:w-40 bg-white-950 p-2 w-33 shadow-black shadow-lg/30 rounded">
                <h1 class="text-sm">👥Team Activity</h1>
                <p class="text-xs">on track</p>
            </div>
            <div class="absolute bottom-80 right-3 lg:right-60 lg:text-base lg:w-40 bg-white-950 p-2 w-33 shadow-black shadow-lg/30 rounded">
                <h1>📊Project status</h1>
                <p>+5 online</p>
            </div>
            <ion-icon class="size-10 fixed bottom-6 right-6 z-50" name="logo-wechat"></ion-icon>

        </section>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </body>
</html>
